<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Wiki Tam Quốc Việt hóa — tra cứu tướng, kỹ năng và hiệu ứng"
    />
    <title>Wiki Tam Quốc — Việt hóa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Segoe UI"', 'system-ui', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="./css/custom.css" />
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 font-sans antialiased">
    <!-- Header -->
    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-40">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 py-4">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
          <div>
            <h1 class="text-xl sm:text-2xl font-bold text-amber-400 tracking-tight">
              Wiki Tam Quốc
            </h1>
            <p class="text-xs sm:text-sm text-slate-400">Tra cứu tướng · kỹ năng · hiệu ứng (Việt hóa)</p>
          </div>
          <nav class="flex gap-3 text-sm" aria-label="Điều hướng chính">
            <span class="text-amber-400/90 font-medium border-b-2 border-amber-500 pb-0.5">Tướng</span>
            <span class="text-slate-600 cursor-not-allowed" title="Sắp có">Kỹ năng</span>
            <span class="text-slate-600 cursor-not-allowed" title="Sắp có">Hiệu ứng</span>
          </nav>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-10">
      <!-- Hero section -->
      <section aria-labelledby="heroes-heading">
        <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4 mb-6">
          <div>
            <h2 id="heroes-heading" class="text-lg sm:text-xl font-semibold text-slate-100">
              Danh sách tướng
            </h2>
            <p class="text-sm text-slate-400 mt-1">
              Nhấn vào thẻ tướng để xem chi tiết. Trong mô tả kỹ năng, nhấn từ khóa hiệu ứng để xem popup.
            </p>
          </div>

          <!-- Filters -->
          <div
            data-hero-filters
            class="flex flex-wrap gap-2"
            role="group"
            aria-label="Lọc loại tướng"
          >
            <button
              type="button"
              data-filter="all"
              class="filter-active text-sm px-3 py-1.5 rounded-lg border transition-colors"
            >
              Tất cả
            </button>
            <button
              type="button"
              data-filter="normal"
              class="text-sm px-3 py-1.5 rounded-lg border transition-colors"
            >
              Thường
            </button>
            <button
              type="button"
              data-filter="soul"
              class="text-sm px-3 py-1.5 rounded-lg border transition-colors"
            >
              Hồn
            </button>
          </div>
        </div>

        <p id="loading" class="text-center text-slate-400 py-16">Đang tải dữ liệu…</p>
        <p id="error" class="hidden text-center text-rose-400 py-16 px-4"></p>

        <!-- Hero grid: 1 col mobile, 2 tablet, 3+ desktop -->
        <div
          id="hero-grid"
          class="hidden grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5"
        ></div>
      </section>
    </main>

    <footer class="border-t border-slate-800 mt-12 py-6 text-center text-xs text-slate-500">
      <p>Wiki Tam Quốc Việt hóa — MVP static · Cloudflare Pages</p>
    </footer>

    <!-- Hero modal backdrop -->
    <div
      id="hero-modal-backdrop"
      class="hidden fixed inset-0 bg-black/70 z-50"
      aria-hidden="true"
    ></div>

    <!-- Hero modal -->
    <div
      id="hero-modal"
      class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 pointer-events-none"
      role="dialog"
      aria-modal="true"
      aria-labelledby="hero-modal-title"
    >
      <div
        class="pointer-events-auto w-full sm:max-w-2xl lg:max-w-3xl max-h-[92vh] sm:max-h-[90vh]
               bg-slate-900 border border-slate-700 rounded-t-2xl sm:rounded-2xl shadow-2xl
               flex flex-col overflow-hidden"
      >
        <div class="flex items-center justify-between px-4 py-3 border-b border-slate-700 shrink-0">
          <span class="text-sm font-medium text-slate-400">Chi tiết tướng</span>
          <button
            type="button"
            data-modal-close
            class="w-9 h-9 flex items-center justify-center rounded-lg text-slate-400
                   hover:bg-slate-800 hover:text-white transition-colors"
            aria-label="Đóng"
          >
            &times;
          </button>
        </div>
        <div
          data-modal-content
          class="overflow-y-auto p-4 sm:p-6 flex-1"
        ></div>
      </div>
    </div>

    <!-- Effect glossary: light backdrop (mobile) + popover / bottom sheet -->
    <div
      id="effect-popup-backdrop"
      class="effect-backdrop hidden"
      aria-hidden="true"
    ></div>

    <div
      id="effect-popup"
      class="effect-popup hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="effect-popup-title"
      aria-live="polite"
    >
      <div class="effect-popup__panel">
        <button
          type="button"
          class="effect-popup__close"
          data-effect-close
          aria-label="Đóng"
        >
          &times;
        </button>
        <h4 id="effect-popup-title" class="effect-popup__title" data-effect-title></h4>
        <p class="effect-popup__desc" data-effect-desc></p>
      </div>
    </div>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
